<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tracjectory | MLB Fan Standing & Rooting Companion</title>
    <!-- SEO Optimization -->
    <meta name="description" content="Tracjectory helps baseball fans track daily MLB standings, schedules, and calculations like wild card math, magic numbers, and who to root for in other matchups." />
    <!-- Web App Capabilities (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="app"></div>
    <div id="app-splash-screen" class="splash-screen">
      <div class="splash-content">
        <h1 class="splash-logo">Tracjectory</h1>
        <div class="splash-tagline">Daily Fan Intelligence</div>
        <div class="splash-season">2026 Season</div>
        <div class="splash-loader-bar">
          <div class="splash-loader-progress"></div>
        </div>
        <div class="splash-status">Initializing standings & schedule...</div>
        <div class="splash-version">v1.3.0</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
